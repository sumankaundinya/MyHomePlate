<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MyHomePlate" />
    <title>MyHomePlate - Fresh from Home Kitchens</title>
    <meta
      name="description"
      content="Discover delicious homemade Indian dishes from local chefs. Order authentic home-cooked meals or become a home chef on MyHomePlate."
    />
    <meta name="author" content="Suman Kumar Kaundinya" />
    <meta name="google-site-verification" content="qyUXpn4gJQOk4Ph6PaYaztIwzD6QTQoX4xlQpkSvBUQ" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MyHomePlate",
      "url": "https://www.myhomeplate.in",
      "description": "A home-cooked meal marketplace connecting local home chefs with food lovers.",
      "founder": {
        "@type": "Person",
        "name": "Suman Kumar Kaundinya",
        "email": "sumanj241118@gmail.com"
      },
      "author": {
        "@type": "Person",
        "name": "Suman Kumar Kaundinya"
      }
    }
    </script>

    <meta
      property="og:title"
      content="MyHomePlate - Fresh from Home Kitchens"
    />
    <meta
      property="og:description"
      content="Connect with local home chefs cooking authentic Indian dishes"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/background.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MyHomePlate" />
    <meta name="twitter:image" content="/images/background.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Preload the background image for faster rendering -->
    <link rel="preload" as="image" href="/images/background.jpg" />
    <!-- Razorpay Checkout -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>

  <body>
    <!-- React root -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA service worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .catch((err) => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
