<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-96x96.png" type="image/png" sizes="96x96" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MyHomePlate" />
    <title>MyHomePlate - Fresh from Home Kitchens</title>
    <meta
      name="description"
      content="Discover delicious homemade Indian dishes from local chefs. Order authentic home-cooked meals or become a home chef on MyHomePlate."
    />
    <meta name="author" content="Suman Kumar Kaundinya" />
    <meta name="google-site-verification" content="qyUXpn4gJQOk4Ph6PaYaztIwzD6QTQoX4xlQpkSvBUQ" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MyHomePlate",
      "url": "https://www.myhomeplate.in",
      "description": "A home-cooked meal marketplace connecting local home chefs with food lovers."
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MyHomePlate",
      "url": "https://www.myhomeplate.in",
      "logo": "https://www.myhomeplate.in/logo.png",
      "description": "A home-cooked meal marketplace connecting local home chefs with food lovers.",
      "foundingDate": "2024",
      "founder": {
        "@type": "Person",
        "name": "Suman Kumar Kaundinya"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+916303231913",
        "contactType": "customer service"
      },
      "sameAs": [
        "https://www.linkedin.com/company/myhomeplate"
      ]
    }
    </script>

    <meta
      property="og:title"
      content="MyHomePlate - Fresh from Home Kitchens"
    />
    <meta
      property="og:description"
      content="Connect with local home chefs cooking authentic Indian dishes"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://www.myhomeplate.in/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MyHomePlate" />
    <meta name="twitter:image" content="https://www.myhomeplate.in/logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Preload the background image for faster rendering -->
    <link rel="preload" as="image" href="/images/background.jpg" />
    <!-- Razorpay Checkout -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>

  <body>
    <!-- React root -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA service worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .catch((err) => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
